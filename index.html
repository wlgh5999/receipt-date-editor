<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>휴먼임팩트 영수증 날짜 수정기</title>
  <style>
    :root {
      --bg: #fff8f1;
      --card: #ffffff;
      --text: #2b2118;
      --muted: #7a6b5d;
      --line: #f1dfcf;
      --primary: #f58220;
      --primary-dark: #e66f00;
      --accent: #e6007e;
      --danger: #dc2626;
      --ok: #15803d;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(245,130,32,.18), transparent 290px),
        radial-gradient(circle at top right, rgba(230,0,126,.11), transparent 280px),
        linear-gradient(180deg, #fff3e6 0%, var(--bg) 300px);
      color: var(--text);
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 36px 20px 60px;
    }

    header {
      margin-bottom: 24px;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(320px, 86vw);
      padding: 10px 14px;
      margin-bottom: 18px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(245, 130, 32, 0.18);
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
    }

    .brand-logo img {
      display: block;
      width: 100%;
      height: auto;
    }


    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 11px;
      border: 1px solid rgba(245,130,32,.35);
      border-radius: 999px;
      color: var(--primary-dark);
      background: #fff4e8;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      color: #17110b;
      font-size: clamp(26px, 4vw, 40px);
      letter-spacing: -0.04em;
      line-height: 1.2;
    }

    .lead {
      margin: 12px 0 0;
      max-width: 760px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: 410px 1fr;
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 960px) {
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-head {
      padding: 20px 22px;
      border-bottom: 1px solid var(--line);
    }

    .card-head h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .card-body {
      padding: 22px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 800;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    input[type="file"],
    input[type="date"],
    input[type="number"],
    input[type="text"] {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(245, 130, 32, 0.16);
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    button, .button {
      appearance: none;
      border: 0;
      border-radius: 13px;
      min-height: 46px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: transform .08s ease, background .12s ease, opacity .12s ease;
    }

    button:active, .button:active { transform: translateY(1px); }

    .primary {
      background: var(--primary);
      color: #fff;
    }

    .primary:hover { background: var(--primary-dark); }

    .secondary {
      background: #fff7ef;
      color: #2b2118;
      border: 1px solid #f2d5bd;
    }

    .secondary:hover { background: #ffe8d4; }

    .button[aria-disabled="true"],
    button:disabled {
      opacity: .45;
      cursor: not-allowed;
      pointer-events: none;
    }


    .small-field {
      margin-bottom: 0;
    }

    .status {
      min-height: 24px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #fffaf5;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      margin-top: 14px;
      white-space: pre-line;
    }

    .status.ok {
      color: var(--ok);
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
    }

    .status.err {
      color: var(--danger);
      background: #fef2f2;
      border: 1px solid #fecaca;
    }

    .preview-wrap {
      padding: 18px;
      background: #f7eadf;
      min-height: 680px;
      display: grid;
      place-items: start center;
      overflow: auto;
    }

    .preview-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .preview-toolbar strong {
      font-size: 14px;
    }

    .canvas-shell {
      position: relative;
      background: white;
      box-shadow: 0 12px 30px rgba(15, 23, 42, .18);
    }

    canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }

    .empty {
      width: 100%;
      min-height: 620px;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 40px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 4px 9px;
      border-radius: 999px;
      background: #fff0f7;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
    }

    .note {
      margin: 18px 0 0;
      padding: 14px 15px;
      border-radius: 14px;
      background: #fffbeb;
      border: 1px solid #fde68a;
      color: #92400e;
      font-size: 13px;
      line-height: 1.55;
    }

    .detected {
      margin-top: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    .detected strong { color: var(--text); }
  </style>
</head>

      <h1>휴먼임팩트 영수증 날짜 수정기</h1>
      <p class="lead">영수증 PDF를 업로드한 뒤 결제(입금)일 날짜 위에 새 날짜를 덮어써서 수정본을 다운로드합니다.</p>
    </header>

    <main class="grid">
      <section class="card">
        <div class="card-head">
          <h2>수정 정보</h2>
        </div>
        <div class="card-body">
          <div class="field">
            <label for="pdfFile">1. PDF 파일 업로드 <span class="hint">1페이지 영수증 기준</span></label>
            <input id="pdfFile" type="file" accept="application/pdf" />
            <div class="detected" id="detectedText">아직 PDF가 선택되지 않았습니다.</div>
          </div>

          <div class="field">
            <label for="newDate">2. 변경할 결제(입금)일</label>
            <input id="newDate" type="date" />
          </div>

          <div class="field">
            <label for="fileName">3. 저장 파일명 <span class="hint">자동 입력</span></label>
            <input id="fileName" type="text" placeholder="예: 주문영수증(홍길동).pdf" />
          </div>

          <div class="btn-row">
            <button id="previewBtn" class="secondary" type="button">미리보기 갱신</button>
            <button id="downloadBtn" class="primary" type="button">수정 PDF 다운로드</button>
          </div>

          <div id="status" class="status">PDF를 업로드하고 변경할 날짜를 선택하세요.</div>

        </div>
      </section>

      <section class="card">
        <div class="preview-toolbar">
          <strong>미리보기</strong>
          <span class="pill">첫 페이지 기준</span>
        </div>
        <div class="preview-wrap">
          <div id="empty" class="empty">
            <div>
              <div style="font-size:42px; margin-bottom:10px;">📄</div>
              <strong>PDF 미리보기 영역</strong>
              <p style="margin:8px 0 0;">파일을 업로드하면 수정 결과를 확인할 수 있습니다.</p>
            </div>
          </div>
          <div id="canvasShell" class="canvas-shell" style="display:none;">
            <canvas id="pdfCanvas"></canvas>
          </div>
        </div>
      </section>
    </main>

  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    const els = {
      pdfFile: document.getElementById('pdfFile'),
      newDate: document.getElementById('newDate'),
      fileName: document.getElementById('fileName'),
      previewBtn: document.getElementById('previewBtn'),
      downloadBtn: document.getElementById('downloadBtn'),
      status: document.getElementById('status'),
      detectedText: document.getElementById('detectedText'),
      empty: document.getElementById('empty'),
      canvasShell: document.getElementById('canvasShell'),
      canvas: document.getElementById('pdfCanvas')
    };

    let originalBytes = null;
    let modifiedBytes = null;
    let sourceFileName = '';
    let detectedCustomerName = '';

    if (window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }

    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    els.newDate.value = `${yyyy}-${mm}-${dd}`;

    function setStatus(message, type = '') {
      els.status.textContent = message;
      els.status.className = `status ${type}`.trim();
    }

    const DEFAULT_SETTINGS = {
      x: 164.0,
      y: 616.6,
      w: 46.8,
      h: 11.8,
      fontSize: 9,
      textOffsetY: 2.25,
      fontResource: 'F2',
      textGray: 0.333
    };

    function safeFilePart(text) {
      return String(text || '')
        .replace(/[\\/:*?"<>|]/g, '')
        .replace(/\s+/g, '')
        .trim();
    }

    function makeDefaultFileName() {
      const name = safeFilePart(detectedCustomerName) || '이름';
      return `주문영수증(${name}).pdf`;
    }

    function ensurePdfExtension(name) {
      const cleaned = safeFilePart(name) || makeDefaultFileName();
      return /\.pdf$/i.test(cleaned) ? cleaned : `${cleaned}.pdf`;
    }

    async function extractDetectedDate(bytes) {
      detectedCustomerName = '';
      try {
        const loadingTask = pdfjsLib.getDocument({ data: bytes.slice(0) });
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);
        const textContent = await page.getTextContent();
        const text = textContent.items.map(item => item.str).join(' ').replace(/\s+/g, ' ').trim();

        const dateMatch = text.match(/결제\s*\(입금\)일\s*[:：]?\s*(\d{4}-\d{2}-\d{2})/);
        const nameMatch = text.match(/주문자\s*정보\s*[:：]?\s*([가-힣A-Za-z]{2,20})/);

        if (nameMatch) {
          detectedCustomerName = nameMatch[1];
          els.fileName.value = makeDefaultFileName();
        }

        const dateText = dateMatch
          ? `기존 결제일: <strong>${dateMatch[1]}</strong>`
          : '기존 결제일 자동 감지 없음';
        const nameText = detectedCustomerName
          ? `주문자명: <strong>${detectedCustomerName}</strong>`
          : '주문자명 자동 감지 없음';

        els.detectedText.innerHTML = `${dateText} · ${nameText}`;
      } catch (err) {
        els.detectedText.textContent = '주문자명과 기존 날짜 자동 감지에 실패했습니다. 직접 수정은 가능합니다.';
      }
    }

    async function createModifiedPdf() {
      if (!originalBytes) throw new Error('먼저 PDF 파일을 업로드해주세요.');
      if (!els.newDate.value) throw new Error('변경할 결제(입금)일을 선택해주세요.');

      const { PDFDocument, PDFRawStream } = PDFLib;
      const pdfDoc = await PDFDocument.load(originalBytes.slice(0));
      const pages = pdfDoc.getPages();

      if (!pages.length) throw new Error('PDF 페이지를 찾지 못했습니다.');

      const page = pages[0];

      const x = DEFAULT_SETTINGS.x;
      const y = DEFAULT_SETTINGS.y;
      const w = DEFAULT_SETTINGS.w;
      const h = DEFAULT_SETTINGS.h;
      const fontSize = DEFAULT_SETTINGS.fontSize;
      const textOffsetY = DEFAULT_SETTINGS.textOffsetY;
      const baselineY = y + textOffsetY;
      const fontResource = DEFAULT_SETTINGS.fontResource;
      const gray = DEFAULT_SETTINGS.textGray;

      function fmt(n) { return Number(n).toFixed(3); }
      function pdfNameSafe(name) { return name.replace(/[^A-Za-z0-9_.-]/g, ''); }
      function toUtf16BEHex(text) {
        return Array.from(text).map(ch => {
          const code = ch.charCodeAt(0);
          return code.toString(16).padStart(4, '0');
        }).join('').toUpperCase();
      }

      const rawContent = [
        'q',
        '1 1 1 rg',
        `${fmt(x)} ${fmt(y)} ${fmt(w)} ${fmt(h)} re f`,
        'Q',
        'q',
        `${fmt(gray)} ${fmt(gray)} ${fmt(gray)} rg`,
        '0 Tr',
        'BT',
        `/${pdfNameSafe(fontResource)} ${fmt(fontSize)} Tf`,
        `${fmt(x)} ${fmt(baselineY)} Td`,
        `<${toUtf16BEHex(els.newDate.value)}> Tj`,
        'ET',
        'Q'
      ].join('\n');

      try {
        let streamRef;
        if (PDFRawStream && PDFRawStream.of) {
          const stream = PDFRawStream.of(pdfDoc.context.obj({}), new TextEncoder().encode(rawContent));
          streamRef = pdfDoc.context.register(stream);
        } else {
          streamRef = pdfDoc.context.register(pdfDoc.context.stream(rawContent));
        }
        page.node.addContentStream(streamRef);
      } catch (err) {
        throw new Error('PDF 내부 글꼴 리소스를 사용하는 데 실패했습니다. 원본 영수증 양식을 확인해주세요.');
      }

      return await pdfDoc.save();
    }

    async function renderPreview(bytes) {
      const loadingTask = pdfjsLib.getDocument({ data: bytes.slice(0) });
      const pdf = await loadingTask.promise;
      const page = await pdf.getPage(1);

      const containerWidth = Math.min(720, document.querySelector('.preview-wrap').clientWidth - 38);
      const rawViewport = page.getViewport({ scale: 1 });
      const scale = containerWidth / rawViewport.width;
      const viewport = page.getViewport({ scale });

      const context = els.canvas.getContext('2d');
      els.canvas.width = viewport.width;
      els.canvas.height = viewport.height;

      await page.render({ canvasContext: context, viewport }).promise;

      els.empty.style.display = 'none';
      els.canvasShell.style.display = 'block';
    }

    async function updatePreview() {
      try {
        setStatus('수정 PDF를 생성하고 미리보기를 갱신하는 중입니다...');
        modifiedBytes = await createModifiedPdf();
        await renderPreview(modifiedBytes);
        setStatus('미리보기가 갱신되었습니다. 날짜 위치를 확인한 뒤 다운로드하세요.', 'ok');
      } catch (err) {
        console.error(err);
        setStatus(err.message || '미리보기 생성 중 오류가 발생했습니다.', 'err');
      }
    }

    async function downloadPdf() {
      try {
        if (!modifiedBytes) {
          modifiedBytes = await createModifiedPdf();
        }

        const blob = new Blob([modifiedBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const customName = els.fileName.value.trim();
        a.href = url;
        a.download = customName ? ensurePdfExtension(customName) : makeDefaultFileName();
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);

        setStatus('수정 PDF를 다운로드했습니다.', 'ok');
      } catch (err) {
        console.error(err);
        setStatus(err.message || '다운로드 중 오류가 발생했습니다.', 'err');
      }
    }

    els.pdfFile.addEventListener('change', async (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;

      if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) {
        setStatus('PDF 파일만 업로드할 수 있습니다.', 'err');
        return;
      }

      try {
        sourceFileName = file.name;
        detectedCustomerName = '';
        originalBytes = new Uint8Array(await file.arrayBuffer());
        modifiedBytes = null;
        els.fileName.value = makeDefaultFileName();
        setStatus('PDF를 불러왔습니다. 미리보기를 생성하는 중입니다...');
        await extractDetectedDate(originalBytes);
        await updatePreview();
      } catch (err) {
        console.error(err);
        setStatus(err.message || 'PDF를 불러오는 중 오류가 발생했습니다.', 'err');
      }
    });

    els.newDate.addEventListener('input', () => {
      modifiedBytes = null;
    });

    els.previewBtn.addEventListener('click', updatePreview);
    els.downloadBtn.addEventListener('click', async () => {
      if (!modifiedBytes) {
        await updatePreview();
      }
      await downloadPdf();
    });
  </script>
</body>
</html>
